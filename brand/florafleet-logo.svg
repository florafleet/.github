<?xml version="1.0" encoding="UTF-8"?>
<!-- FloraFleet logo mark — transparent background.
     A sprout: a central stem with two leaves unfurling. The leaf veins
     double as a subtle nod to "many nodes, one fleet" without spelling
     out any tech. Single accent green; works at favicon size up. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="FloraFleet">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43a047"/>
      <stop offset="1" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>

  <!-- stem -->
  <path d="M256 432 V236"
        fill="none" stroke="#2e7d32" stroke-width="22" stroke-linecap="round"/>

  <!-- right leaf -->
  <path d="M256 250
           C 300 150, 392 150, 430 120
           C 432 210, 360 286, 270 274
           Z"
        fill="url(#leaf)"/>
  <!-- right leaf midrib -->
  <path d="M276 266 C 340 220, 388 176, 422 132"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>

  <!-- left leaf -->
  <path d="M250 300
           C 198 214, 110 220, 78 196
           C 80 282, 156 350, 244 330
           Z"
        fill="url(#leaf)"/>
  <!-- left leaf midrib -->
  <path d="M236 322 C 178 282, 132 240, 92 206"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>

  <!-- sprout tip bud -->
  <circle cx="256" cy="224" r="20" fill="#66bb6a"/>
</svg>
