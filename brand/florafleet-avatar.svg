<?xml version="1.0" encoding="UTF-8"?>
<!-- FloraFleet avatar — filled rounded-square background, for the GitHub
     org profile picture (GitHub masks it to a circle, so keep the mark
     well inside a safe central area). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="FloraFleet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f5e9"/>
      <stop offset="1" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43a047"/>
      <stop offset="1" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- stem -->
  <path d="M256 420 V244"
        fill="none" stroke="#2e7d32" stroke-width="22" stroke-linecap="round"/>

  <!-- right leaf -->
  <path d="M256 256
           C 296 168, 380 168, 414 142
           C 416 222, 352 290, 270 278
           Z"
        fill="url(#leaf2)"/>
  <path d="M276 270 C 334 230, 378 190, 408 152"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>

  <!-- left leaf -->
  <path d="M250 300
           C 204 222, 124 228, 96 206
           C 98 284, 166 344, 246 326
           Z"
        fill="url(#leaf2)"/>
  <path d="M236 318 C 184 282, 142 244, 108 214"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>

  <!-- sprout tip bud -->
  <circle cx="256" cy="232" r="20" fill="#66bb6a"/>
</svg>
